# GoatIDE GA build profile.
# Wraps the gulp-produced .build/VSCode-<platform> portable app folder into an installer.
# Invoked via: scripts/package-goatide.sh (no --test flag).
# Output: dist/GoatIDE-Setup-<arch>.exe (Windows) or dist/GoatIDE-<arch>.dmg (macOS).
#
# NEVER use a `build` key in package.json -- VS Code's build system reads package.json
# programmatically and the `build` key conflicts (PITFALLS.md Anti-Patterns #2).
appId: ai.goatide.GoatIDE
productName: GoatIDE
copyright: Copyright (c) 2026 GoatIDE
directories:
  output: dist
asar: true
asarUnpack:
  - "kernel/**"   # exact glob per 18-DIAGNOSTICS/SPIKE-ASARUNPACK.md verdict; kernel/ is at app root
files:
  - "extensions/**"
  - "kernel/**"   # included here so electron-builder packs it into the asar before asarUnpack extracts it
  - "out/**"
  - "resources/**"
  - "package.json"
  - "product.json"
npmRebuild: false  # kernel/node_modules/better-sqlite3 already ABI-140; do NOT re-rebuild for renderer ABI
electronFuses:
  runAsNode: false
  enableNodeCliInspectArguments: false
  enableNodeOptionsEnvironmentVariable: false
  onlyLoadAppFromAsar: true
  enableEmbeddedAsarIntegrityValidation: true
win:
  target: nsis                                          # Phase 18 (already present)
  artifactName: "${productName}-Setup-${arch}.${ext}"   # Phase 18 (already present)
  # Phase 22 C2 (Plan 22-03): Azure Trusted Signing.
  # DISABLED 2026-05-20 -- merely having `azureSignOptions` present triggers
  # electron-builder to attempt Azure Trusted Signing whenever the host has the
  # TrustedSigning PowerShell module installed, regardless of whether AZURE_*
  # env vars are set. With `<TBD-...>` placeholders that signing call fails and
  # blocks the build (rebuild on 2026-05-20 surfaced this against Plan 22-03's
  # original wiring). When C2 re-opens, uncomment the block AND replace the
  # placeholders per .planning/phases/22-distribution/22-03-AZURE-SETUP.md Step 5.
  # CI auth via AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET (service
  # principal, NOT OIDC -- Invoke-TrustedSigning does not understand federated identity).
  # azureSignOptions:
  #   publisherName: "<TBD-AZURE-CN>"                     # MUST match the CN in the Certificate Profile exactly
  #   endpoint: "<TBD-AZURE-REGION-ENDPOINT>"             # e.g. https://neu.codesigning.azure.net/ for North Europe
  #   certificateProfileName: "<TBD-PROFILE-NAME>"
  #   codeSigningAccountName: "<TBD-ACCOUNT-NAME>"        # Trusted Signing Account name (NOT the App Registration name)
  #   fileDigest: "SHA256"
  #   timestampDigest: "SHA256"
  #   timestampRfc3161: "http://timestamp.acs.microsoft.com"
mac:
  target:
    - dmg
    - zip
  hardenedRuntime: true                                          # Phase 18 (already present)
  category: public.app-category.developer-tools                  # Phase 18 (already present)
  entitlements: build/signing/entitlements.mac.plist             # Phase 22 C1
  entitlementsInherit: build/signing/entitlements.mac.inherit.plist  # Phase 22 C1
  notarize: false                                                # Phase 22 C1: custom afterSign hook controls notarization (no double-notarize)
  gatekeeperAssess: false                                        # Phase 22 C1: suppress local gatekeeper check during build (CI does not have a user keychain)
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

# Phase 22 C1 (Plan 22-02): macOS signing + notarization hooks. Hooks short-circuit on non-darwin platforms.
# Note: `beforeSign` is NOT a valid top-level electron-builder@26.x hook (schema only
# recognises afterPack/afterSign/afterAllArtifactBuild/beforeBuild/beforePack/artifactBuild*).
# Plan 22-02 introduced `beforeSign` in error; electron-builder rejected the YAML the moment
# a real build ran (rebuild on 2026-05-20 surfaced this). The hook script itself
# (build/signing/beforeSign.cjs) is preserved as documentation of the .node re-sign step.
# When C1 re-opens, rewire it as `afterPack` (re-sign .node files post-pack, before
# afterSign notarization).
afterSign: build/signing/afterSign.cjs
afterAllArtifactBuild: build/signing/afterAllArtifactBuild.cjs

# Phase 22 C3 (Plan 22-04): GitHub Releases as the auto-update source.
# electron-updater fetches latest.yml + latest-mac.yml from the latest release.
# releaseType: draft means electron-builder uploads to a DRAFT GitHub Release --
# promoting to a public release is a manual operator step (gate against publishing
# broken/unsigned builds).
publish:
  provider: github
  owner: rahulp7801
  repo: goatide
  releaseType: draft
