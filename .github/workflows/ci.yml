name: CI

# GoatIDE CI gate orchestration.
#
# Wave 0 scope: refusal-checks + refusal-meta. The four constitutional
# refusals (FORK-04, FORK-06, FORK-07, FORK-08) and their meta-tests run
# on every push and PR to main/dev BEFORE any build job executes. No
# build/lint/test job is wired here yet — those land in Plan 01-03 once
# upstream microsoft/vscode is cloned and a real package.json exists.
# Adding a placeholder green build step would violate the spirit of
# Mandate D (Verification-First Flow) by silently passing without proof.

on:
  push:
    # `master` is the current branch on this fork (branching_strategy=none for v1).
    # `main` and `dev` are kept as future-friendly aliases per upstream convention.
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  refusal-checks:
    name: Refusal Checks (FORK-04, FORK-06, FORK-07, FORK-08, TRAV-06)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout (full history for FORK-04 diff)
        uses: actions/checkout@v4
        with:
          # refuse-vs-workbench-edits.sh diffs HEAD against $UPSTREAM_BASE.SHA;
          # without full history that diff base is unreachable.
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          # Plan 01-03 will introduce .nvmrc when upstream is cloned. Until
          # then, pin Node 22 here so the runner has native fetch (used by
          # validate-openvsx.mjs without any npm dependency).
          node-version: 22

      - name: Install ripgrep
        # ubuntu-22.04 GitHub runners ship ripgrep preinstalled as of 2026,
        # but install explicitly so a runner-image regression is caught at
        # `apt install` time rather than as a mysterious refusal-script
        # failure mid-CI.
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: FORK-06 — refuse marketplace.visualstudio.com references
        run: bash scripts/ci/refuse-marketplace.sh

      - name: FORK-07 — refuse vector / embedding libraries
        run: bash scripts/ci/refuse-vector-libs.sh

      - name: FORK-04 — refuse non-allowlisted vs/workbench edits
        run: bash scripts/ci/refuse-vs-workbench-edits.sh

      - name: FORK-08 — validate Open VSX recommended ids
        run: node scripts/validate-openvsx.mjs

      - name: TRAV-06 — refuse fuzzy / similarity / did-you-mean fallback
        run: bash scripts/ci/refuse-fuzzy-fallback.sh

  refusal-meta:
    name: Refusal Meta-Tests
    runs-on: ubuntu-22.04
    needs: refusal-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Meta-test — refusal-marketplace-meta.sh
        run: bash scripts/test/refusal-marketplace-meta.sh
      - name: Meta-test — refusal-vector-meta.sh
        run: bash scripts/test/refusal-vector-meta.sh
      - name: Meta-test — refusal-openvsx-meta.sh
        run: bash scripts/test/refusal-openvsx-meta.sh
      - name: Meta-test — refusal-fuzzy-fallback-meta.sh
        run: bash scripts/test/refusal-fuzzy-fallback-meta.sh

  # build-linux / build-mac / build-windows — Plan 01-05 (Wave 3) phase-verify.
  # Now that the upstream microsoft/vscode tree (Plan 01-03), brander, and the
  # kernel/bridge skeleton (Plan 01-04) all exist, the cross-platform build
  # matrix is wired here so the Phase-1 success criterion 2 ("clean profile
  # launch on macOS, Windows, Linux") has CI-level coverage. The developer's
  # host platform covers the manual visual half (FORK-02 chrome + FORK-03
  # network capture). CI proves the binary builds.

  build-linux:
    name: Build Linux (gulp vscode-linux-x64)
    runs-on: ubuntu-22.04
    needs: refusal-checks
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Install kernel/ deps
        working-directory: ./kernel
        run: npm install
      - name: Build kernel/ (dist/ required by e2e tests)
        working-directory: ./kernel
        run: npm run build
      - name: Run kernel/ vitest suite
        working-directory: ./kernel
        run: npx vitest run --reporter=dot
        # Phase 2 sanity check + (waves 1-4) integration tests against real on-disk SQLite.
        # FORBIDDEN flags: --watch (would hang CI). Required: 'run' subcommand for clean exit.
      - name: Install Linux native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev python-is-python3 fakeroot rpm jq ripgrep
      - name: npm install (vscode upstream tree)
        env:
          # Authenticate @vscode/ripgrep's postinstall download against
          # github.com/microsoft/ripgrep-prebuilt — unauthenticated requests
          # hit the 60/hr API rate limit and fail with 403.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm install
      - name: Brander (idempotent)
        run: bash scripts/prepare_goatide.sh
      - name: Brander idempotency
        run: |
          if [[ -n "$(git diff --stat product.json package.json)" ]]; then
            echo "Brander not idempotent on Linux runner"; exit 1
          fi
      - name: Compile
        run: npm run compile
      - name: gulp vscode-linux-x64-min
        run: npm run gulp vscode-linux-x64-min
      - name: Smoke test (clean-profile launch via xvfb)
        # Best-effort smoke; CI runners may struggle with launch (no display,
        # signing, etc.). The binary build itself is the FORK-01 close; the
        # developer's host launch (Plan 01-05 Task 3) is the FORK-03 close.
        run: |
          sudo apt-get install -y xvfb
          xvfb-run --auto-servernum bash scripts/test/clean-profile-launch.sh || echo "Smoke launch best-effort failed; binary build is the FORK-01 close, host launch is the FORK-03 close. Logged as research-flag."
        continue-on-error: true

  build-mac:
    name: Build macOS (gulp vscode-darwin-arm64)
    runs-on: macos-14
    needs: refusal-checks
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Install kernel/ deps
        working-directory: ./kernel
        run: npm install
      - name: Build kernel/ (dist/ required by e2e tests)
        working-directory: ./kernel
        run: npm run build
      - name: Run kernel/ vitest suite
        working-directory: ./kernel
        run: npx vitest run --reporter=dot
      - name: Install macOS deps
        run: brew install jq ripgrep
      - name: npm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm install
      - name: Brander (idempotent)
        run: bash scripts/prepare_goatide.sh
      - name: Brander idempotency
        run: |
          if [[ -n "$(git diff --stat product.json package.json)" ]]; then
            echo "Brander not idempotent on macOS runner"; exit 1
          fi
      - name: Compile
        run: npm run compile
      - name: gulp vscode-darwin-arm64-min
        run: npm run gulp vscode-darwin-arm64-min
      - name: Smoke test (clean-profile launch)
        run: bash scripts/test/clean-profile-launch.sh || echo "Smoke launch best-effort failed; logged as research-flag."
        continue-on-error: true

  build-windows:
    name: Build Windows (gulp vscode-win32-x64)
    runs-on: windows-2022
    needs: refusal-checks
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Install kernel/ deps
        working-directory: ./kernel
        shell: bash
        run: npm install
      - name: Build kernel/ (dist/ required by e2e tests)
        working-directory: ./kernel
        shell: bash
        run: npm run build
      - name: Run kernel/ vitest suite
        working-directory: ./kernel
        shell: bash
        run: npx vitest run --reporter=dot
      - name: Install Windows deps (jq, ripgrep)
        run: |
          choco install -y jq ripgrep
      - name: npm install
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm install
      - name: Brand
        shell: bash
        run: bash scripts/prepare_goatide.sh
      - name: Brander idempotency (bash)
        shell: bash
        run: |
          if [[ -n "$(git diff --stat product.json package.json)" ]]; then
            echo "Brander not idempotent on Windows runner"; exit 1
          fi
      - name: Compile
        shell: bash
        run: npm run compile
      - name: gulp vscode-win32-x64-min
        shell: bash
        run: npm run gulp vscode-win32-x64-min
      - name: Smoke test (clean-profile launch)
        shell: bash
        # Plan 01-02 Task 2: Windows path uses Git Bash with cmd.exe shellout.
        run: bash scripts/test/clean-profile-launch.sh || echo "Smoke launch best-effort failed; logged as research-flag."
        continue-on-error: true
